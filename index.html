<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sticky Notes</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

#addBtn{
padding:10px;
font-size:16px;
cursor:pointer;
}

.note{
background:yellow;
padding:15px;
margin:10px;
width:200px;
display:inline-block;
position:relative;
}

.delete{
position:absolute;
top:5px;
right:5px;
cursor:pointer;
color:red;
}

textarea{
width:100%;
border:none;
background:transparent;
resize:none;
outline:none;
}

</style>

</head>
<body>

<h1>Sticky Notes</h1>

<button id="addBtn">Add Note</button>

<div id="notesContainer"></div>

<script src="script.js"></script>

</body>
</html>
